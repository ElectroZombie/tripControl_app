name: trip_control_app
description: Una aplicación móvil para apoyar los controles de viajes al extranjero para comprar artículos.
publish_to: 'none'
version: 1.0.5

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.0.1
  dropdown_search: ^5.0.6
  path: any
  pdf: ^3.10.8
  #path_provider: ^2.1.3
  #flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  sqflite_common_ffi: any

